<!doctype html>
<html>
  <head>
    <title>Cypher Clean</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero-panel">
        <h1>Cypher Clean</h1>

        <div class="controls">
          <button id="pickFolderBtn">Choose Folder</button>
          <button id="scanBtn" disabled>Scan folders</button>
        </div>

        <p id="selectedPath">No folder selected.</p>
        <div class="status-row">
          <div id="status" class="status-message"></div>
          <div id="loadingSpinner" class="spinner hidden"></div>
          <span class="loading-text hidden">Analyzing...</span>
        </div>
      </section>

      <div id="resultControls" class="result-controls hidden">
        <div class="filter-group">
          <span>Filter:</span>
          <label>
            <input type="checkbox" class="type-filter" value="node" checked />
            Node
          </label>
          <label>
            <input type="checkbox" class="type-filter" value="python" checked />
            Python
          </label>
          <label>
            <input type="checkbox" class="type-filter" value="java" checked />
            Java
          </label>
            
          <label>
            <input type="checkbox" class="type-filter" value="next" checked />
            Next
          </label>
        </div>
        <div class="sort-group">
          <label for="sortBy">Sort:</label>
          <select id="sortBy">
            <option value="">No sorting</option>
            <option value="size_desc">Size (largest first)</option>
            <option value="created_asc">Created (oldest first)</option>
            <option value="modified_asc">Modified (oldest first)</option>
          </select>
        </div>
      </div>
    <script src="app.js"></script>
  </body>
</html>
